version: "3.7"
services:
  ai-service:
    build: ../ai-service
    container_name: ai-service
    restart: always
    ports:
      - 5001:5001
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-O",
          "/dev/null",
          "-q",
          "http://ai-service:5001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - USE_AZURE_OPENAI=True # set to False if you are not using Azure OpenAI
      - AZURE_OPENAI_DEPLOYMENT_NAME= # required if using Azure OpenAI
      - AZURE_OPENAI_ENDPOINT= # required if using Azure OpenAI
      - AZURE_OPENAI_API_KEY= # required if using Azure OpenAI key auth (not needed with workload identity)
      - OPENAI_API_KEY= # required if using OpenAI (or as fallback for Azure key auth)
      - AZURE_OPENAI_IMAGE_ENDPOINT= # required if using Azure OpenAI image models
      - AZURE_OPENAI_API_VERSION=2024-12-01-preview # optional override for text models
      - AZURE_OPENAI_IMAGE_API_VERSION=2025-04-01-preview # required for gpt-image-2
      - AZURE_OPENAI_IMAGE_DEPLOYMENT_NAME= # required if using Azure OpenAI image models
    networks:
      - backend_services
networks:
  backend_services:
    driver: bridge
