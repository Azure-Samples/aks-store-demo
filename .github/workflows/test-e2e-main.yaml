# composite workflow to test the azd deployment of the app
# uses a github federated identity
name: test-e2e-main

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-e2e:
    uses: ./.github/workflows/test-e2e-reusable.yaml
    secrets: inherit
    with:
      deploy-from-source: true
      deploy-method: helm
      deploy-full-services: true
      source-registry: "ghcr.io/${{ github.repository_owner }}"
