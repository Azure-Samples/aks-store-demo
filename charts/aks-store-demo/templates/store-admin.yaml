apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-admin
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: store-admin
  template:
    metadata:
      labels:
        app: store-admin
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: store-admin
        image: {{ .Values.storeAdmin.image.repository }}:{{ .Values.storeAdmin.image.tag | default .Chart.AppVersion }}
        ports:
        - containerPort: 8081
          name: store-admin         # container images hosted on ghcr.io and will be removed in future releases
        resources:
          requests:
            cpu: 1m
            memory: 200Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8081
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          failureThreshold: 3
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          failureThreshold: 5
          initialDelaySeconds: 3
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: store-admin
spec:
  type: {{ .Values.storeAdmin.serviceType }}
  ports:
  - port: 80
    targetPort: 8081
  selector:
    app: store-admin
{{- if .Values.storeAdmin.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: store-admin
  {{- with .Values.storeAdmin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.storeAdmin.ingress.className }}
  ingressClassName: {{ .Values.storeAdmin.ingress.className }}
  {{- end }}
  {{- if .Values.storeAdmin.ingress.tls }}
  tls:
    {{- toYaml .Values.storeAdmin.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.storeAdmin.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: store-admin
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}
