{{- if eq .Values.useDocumentDB true }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: documentdb
spec:
  serviceName: documentdb
  replicas: 1
  selector:
    matchLabels:
      app: documentdb
  template:
    metadata:
      labels:
        app: documentdb
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: documentdb
        image: ghcr.io/documentdb/documentdb/documentdb-local:pg17-0.112.0
        args:
          - "--username"
          - "username"
          - "--password"
          - "password"
        ports:
        - containerPort: 10260
          name: documentdb
        resources:
          requests:
            cpu: 5m
            memory: 75Mi
          limits:
            cpu: 25m
            memory: 1024Mi
        livenessProbe:
          tcpSocket:
            port: 10260
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 10260
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: documentdb
spec:
  ports:
  - port: 10260
  selector:
    app: documentdb
  type: ClusterIP
{{- end }}
